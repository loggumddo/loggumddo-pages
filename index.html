<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>로또꿈꿔또 문서</title>
    <style>
      :root {
        --bg: #f6f1e7;
        --paper: #fffaf0;
        --text: #2f2418;
        --muted: #6f6250;
        --line: #d8c9a8;
        --accent: #b35c2e;
        --accent-soft: #fff1dc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Apple SD Gothic Neo", "Noto Sans KR", "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at top left, #fff2da 0, transparent 32%),
          linear-gradient(180deg, #f8f2e6 0%, var(--bg) 100%);
        color: var(--text);
      }

      .wrap {
        width: min(920px, calc(100% - 32px));
        margin: 0 auto;
        padding: 36px 0 56px;
      }

      .hero,
      .card {
        background: rgba(255, 250, 240, 0.94);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: 0 16px 38px rgba(47, 36, 24, 0.08);
      }

      .hero {
        padding: 28px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--accent);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(34px, 6vw, 54px);
        line-height: 1.04;
      }

      .hero p {
        margin: 14px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
        font-weight: 600;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 16px;
        margin-top: 18px;
      }

      .card {
        padding: 22px;
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 24px;
      }

      .card p {
        margin: 0 0 18px;
        color: var(--muted);
        line-height: 1.68;
        font-weight: 600;
      }

      .btn {
        display: inline-block;
        padding: 14px 18px;
        border-radius: 999px;
        border: 1px solid var(--accent);
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 800;
        text-decoration: none;
      }

      code {
        font-family: ui-monospace, "SFMono-Regular", Consolas, monospace;
        font-size: 0.95em;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="hero">
        <p class="eyebrow">Lotto Dream Docs</p>
        <h1>로또꿈꿔또 공개 문서</h1>
        <p>
          App Store Connect에 넣을 수 있도록 만든 공개 문서 초안입니다. 아래 두 페이지를
          각각 <code>Support URL</code>, <code>Privacy Policy URL</code>로 사용할 수 있습니다.
        </p>
      </section>

      <section class="grid">
        <article class="card">
          <h2>지원 페이지</h2>
          <p>
            고객지원 문의, 연락처, 구독/환불 안내, 개인정보 문의 채널을 담은 페이지입니다.
          </p>
          <a class="btn" href="./support.html">support.html 열기</a>
        </article>

        <article class="card">
          <h2>개인정보처리방침</h2>
          <p>
            수집 항목, 이용 목적, 제3자 서비스, 보관 및 삭제, 문의 채널을 담은 페이지입니다.
          </p>
          <a class="btn" href="./privacy.html">privacy.html 열기</a>
        </article>
      </section>

    </main>
  </body>
</html>
